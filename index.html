<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف يحيى & خالدية </title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Playball&family=Great+Vibes&family=Amiri:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --rose-gold: #050b83;
            --ivory: #fcfaf2;
            --ivory-dark: #f0e6cd;
            --lace-white: #ffffff;
            --text-main: #5d4a41;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Cairo', sans-serif;
            background-color: var(--ivory);
            overflow-x: hidden; 
            color: var(--text-main);
        }

        /* --- ستائر الافتتاحية --- */
        #dreamy-curtain-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            cursor: pointer;
            transition: visibility 2.5s;
        }

        .curtain-half.left {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background-color: var(--ivory-dark);
            background-image: url('https://www.transparenttextures.com/patterns/cream-pixels.png');
            border-right: 1px solid var(--rose-gold);
            transition: transform 2.5s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .curtain-half.right {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            background-color: var(--ivory-dark);
            background-image: url('https://www.transparenttextures.com/patterns/cream-pixels.png');
            border-left: 1px solid var(--rose-gold);
            transition: transform 2.5s cubic-bezier(0.77, 0, 0.175, 1);
        }

        #script-monogram {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1001;
            transition: all 1.5s ease;
            text-align: center;
            width: 100%;
        }

        #script-monogram-text {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem; 
            color: var(--rose-gold);
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.1);
            animation: monogramFloat 4s ease-in-out infinite;
            line-height: 1.2;
        }

        .curtains-open .curtain-half.left { transform: translateX(-100%); }
        .curtains-open .curtain-half.right { transform: translateX(100%); }
        .curtains-open #script-monogram { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
        .curtains-open { visibility: hidden; pointer-events: none; }

        /* --- المحتوى الرئيسي --- */
        #main-content-wrapper {
            opacity: 0;
            transition: opacity 1.5s ease 2.5s;
            position: relative;
            min-height: 100vh;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 15px; 
            background-color: var(--ivory);
            background-image: url('https://www.transparenttextures.com/patterns/shattered-island.png');
        }

        .card-content {
            max-width: 600px;
            width: 100%;
            text-align: center;
            border: 2px solid var(--rose-gold);
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 0 50px rgba(5, 11, 131, 0.1);
            position: relative;
            z-index: 5;
            margin-top: 20px;
            border-radius: 15px;
            box-sizing: border-box;
        }

        .quran-verse { font-size: 1.2rem; color: var(--rose-gold); margin-bottom: 25px; font-weight: bold; }
        .parents-section { display: flex; justify-content: space-around; margin: 20px 0; gap: 10px; }
        .parent-title { display: block; font-weight: bold; color: var(--rose-gold); font-size: 1.1rem; }
        .name { font-family: 'Amiri', serif; font-size: 3.8rem; color: var(--text-main); display: block; }
        .and-sign { font-family: 'Great Vibes', cursive; font-size: 2.2rem; color: var(--rose-gold); }
        .highlight { color: var(--rose-gold); font-weight: bold; font-size: 1.2rem; }

        .location-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background: var(--rose-gold);
            color: white;
            text-decoration: none;
            border-radius: 50px;
        }

        /* زر الموسيقى */
        #musicBtn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: var(--rose-gold);
            color: white;
            border: none;
            cursor: pointer;
            z-index: 3000;
            display: none;
        }

        @keyframes monogramFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @media (max-width: 600px) {
            .name { font-size: 3rem; }
            #script-monogram-text { font-size: 3.5rem; }
        }
    </style>
</head>

<body>

    <!-- كود الصوت - تأكدي أن الملف في GitHub اسمه music.mp3 -->
    <audio id="weddingMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <button id="musicBtn" onclick="toggleMusic()">🔊</button>

    <div id="dreamy-curtain-container" onclick="openDreamyCurtains()">
        <div class="curtain-half left"></div>
        <div id="script-monogram">
            <div id="script-monogram-text">Y&K <br> <span style="font-family: 'Amiri', serif; font-size: 2.1rem;">عمر واحد واخترته معك</span> <br> <span>23.5.2026</span></div>
        </div>
        <div class="curtain-half right"></div>
    </div>

    <div id="main-content-wrapper">
        <div class="main-container">
            <div class="card-content">
                <div class="quran-verse">﷽ <br> "وَمِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا لِّتَسْكُنُوا إِلَيْهَا..."</div>
                <div class="parents-section">
                    <div><span class="parent-title">والد العريس</span><span>علاء يحيى الكسواني</span></div>
                    <div><span class="parent-title">والد العروس</span><span>أحمد جميل البشتاوي</span></div>
                </div>
                <div class="names-section">
                    <span class="name">يحيى</span>
                    <span class="and-sign">&</span>
                    <span class="name">خالدية</span>
                </div>
                <div class="details-section">
                    يوم <span class="highlight">السبت 23 مايو 2026</span> <br>
                    قاعات <span class="highlight">قصر تريو - قاعة 2</span> <br>
                    الساعة <span class="highlight">8:30 مساءً</span>
                </div>
                <a href="https://maps.app.goo.gl/S9nVurfEHhyEyHqN8?g_st=iw" target="_blank" class="location-btn">📍 موقع القاعة</a>
            </div>
        </div>
    </div>

    <script>
        var music = document.getElementById("weddingMusic");
        var btn = document.getElementById("musicBtn");

        // تشغيل الصوت فور لمس أي مكان (لحل مشكلة حظر المتصفحات)
        document.addEventListener('click', function() {
            if (music.paused) {
                music.play().catch(e => console.log("Audio play failed", e));
            }
        }, { once: true });

        function openDreamyCurtains() {
            document.getElementById('dreamy-curtain-container').classList.add('curtains-open');
            document.getElementById('main-content-wrapper').style.opacity = '1';
            
            music.play().catch(e => console.log("Play error:", e));
            btn.style.display = "block";

            setTimeout(() => { document.body.style.overflow = 'auto'; }, 2500);
        }

        function toggleMusic() {
            if (music.paused) { music.play(); btn.innerHTML = "🔊"; } 
            else { music.pause(); btn.innerHTML = "🔇"; }
        }
    </script>
</body>
</html>
